
version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: invoices
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  invoice-service:
    build: ./invoice-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  mock-psp:
    build: ./mock-psp
    ports:
      - "8081:8081"
